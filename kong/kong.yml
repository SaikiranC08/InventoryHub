_format_version: "3.0"

consumers:
  - username: inventoryhub-user
    jwt_secrets:
      - key: inventoryhub-auth
        algorithm: HS256
        secret: b1946ac92492d2347c6235b4d2611184c0a6e8a4e5d4f12e45c8c8bfb3e3aefd

services:
  - name: inventory-service
    url: http://inventory-service:8080
    routes:
      - name: inventory-route
        paths:
          - /api/v1
        strip_path: false

    plugins:
      - name: jwt
        config:
          claims_to_verify: [exp]
          key_claim_name: iss

      - name: pre-function
        config:
          access:
            - |
              local auth_header = kong.request.get_header("authorization")
              if auth_header then
                local token = auth_header:gsub("Bearer ", "")
                local parts = {}
                for part in token:gmatch("[^.]+") do
                  table.insert(parts, part)
                end
                if parts[2] then
                  local payload = parts[2]
                  -- pad base64 if needed
                  local padding = 4 - (#payload % 4)
                  if padding < 4 then
                    payload = payload .. string.rep("=", padding)
                  end
                  payload = payload:gsub("-", "+"):gsub("_", "/")
                  local decoded_json = ngx.decode_base64(payload)
                  if decoded_json then
                    local cjson = require "cjson.safe"
                    local claims = cjson.decode(decoded_json)
                    if claims and claims.sub then
                      kong.service.request.set_header("X-User-Id", claims.sub)
                    end
                  end
                end
              end

  - name: auth-service
    url: http://auth-service:9898
    routes:
      - name: auth-route
        paths:
          - /auth/v1/login
          - /auth/v1/signup
          - /auth/v1/refreshToken
        strip_path: false